name: Build and Release APK

on:
  push:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'dev'

env:
  ANDROID_BUILD_DIR: ./android

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Make gradlew executable
        run: chmod +x ${{ env.ANDROID_BUILD_DIR }}/gradlew
      
      - name: Build APK
        run: cd ${{ env.ANDROID_BUILD_DIR }} && ./gradlew assembleRelease
        
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: ${{ env.ANDROID_BUILD_DIR }}/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
      
      - name: Generate short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Read app version
        id: appver
        run: |
          ver=$(grep -oP 'versionName\s*=\s*"\K[^"]+' ${{ env.ANDROID_BUILD_DIR }}/app/build.gradle.kts | head -1)
          echo "version=$ver" >> $GITHUB_OUTPUT
      
      - name: Create Stable Release (master/main only)
        if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ANDROID_BUILD_DIR }}/app/build/outputs/apk/release/app-release-unsigned.apk
          tag_name: v${{ github.run_number }}
          name: v${{ github.run_number }} - Stable Release
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Dev Prerelease (dev branch only)
        if: github.ref == 'refs/heads/dev' && success()
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ANDROID_BUILD_DIR }}/app/build/outputs/apk/release/app-release-unsigned.apk
          tag_name: ${{ steps.appver.outputs.version }}-dev
          name: ${{ steps.appver.outputs.version }}-dev - Development Prerelease
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update README (master/main - stable link)
        if: (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Update or add stable download link section
          if grep -q "## Latest Stable Release" README.md; then
            sed -i 's|.*Latest Stable Release.*|## Latest Stable Release\n\n[📥 Download Stable APK](https://github.com/clawthor0/voice-memo-uploader/releases/download/v${{ github.run_number }}/app-release-unsigned.apk)|' README.md
          else
            # If "Latest Build" exists, replace it
            if grep -q "## Latest Build" README.md; then
              sed -i 's|## Latest Build|## Latest Stable Release|' README.md
              sed -i 's|.*Download.*APK.*|[📥 Download Stable APK](https://github.com/clawthor0/voice-memo-uploader/releases/download/v${{ github.run_number }}/app-release-unsigned.apk)|' README.md
            else
              # Add new section at top
              {
                echo "## Latest Stable Release"
                echo ""
                echo "[📥 Download Stable APK](https://github.com/clawthor0/voice-memo-uploader/releases/download/v${{ github.run_number }}/app-release-unsigned.apk)"
                echo ""
                cat README.md
              } > README.md.tmp && mv README.md.tmp README.md
            fi
          fi
          
          git add README.md
          git commit -m "chore: update README with latest stable APK v${{ github.run_number }} [skip ci]" || echo "No changes to commit"
          git push
      
      - name: Update README (dev - add prerelease section)
        if: github.ref == 'refs/heads/dev' && success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add or update dev prerelease section (keep stable section intact)
          {
            # Read file until we find "## Features" or end of file
            in_dev_section=0
            while IFS= read -r line; do
              if [[ "$line" == "## Latest Dev Prerelease" ]]; then
                in_dev_section=1
                continue
              fi
              if [[ $in_dev_section -eq 1 ]]; then
                if [[ "$line" == "##" * ]]; then
                  # Found next section, output dev section first
                  echo "## Latest Dev Prerelease"
                  echo ""
                  echo "[📥 Download Development APK](https://github.com/clawthor0/voice-memo-uploader/releases/download/${{ steps.appver.outputs.version }}-dev/app-release-unsigned.apk)"
                  echo ""
                  echo "$line"
                  in_dev_section=0
                fi
              else
                echo "$line"
              fi
            done < README.md > README.md.tmp
            
            # If we never found next section, append at end
            if [[ $in_dev_section -eq 1 ]]; then
              echo "## Latest Dev Prerelease" >> README.md.tmp
              echo "" >> README.md.tmp
              echo "[📥 Download Development APK](https://github.com/clawthor0/voice-memo-uploader/releases/download/${{ steps.appver.outputs.version }}-dev/app-release-unsigned.apk)" >> README.md.tmp
              echo "" >> README.md.tmp
            fi
            
            mv README.md.tmp README.md
          }
          
          git add README.md
          git commit -m "chore: update README with latest dev prerelease ${{ steps.appver.outputs.version }}-dev [skip ci]" || echo "No changes to commit"
          git push origin dev
